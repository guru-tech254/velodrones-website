<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Velodrones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">VELO<span>DRONES</span></div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="portfolio.html" style="color:var(--accent-blue);">Portfolio</a></li>
                <li><a href="contact.html" class="btn btn-primary">Contact Us</a></li>
            </ul>
            <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
        </nav>
    </header>

    <section class="page-hero">
        <div class="container">
            <h1>Our Portfolio</h1>
            <p>Explore our successful projects across industries</p>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="portfolio-filters" style="display:flex; gap:1rem; justify-content:center; margin-bottom:3rem; flex-wrap:wrap;">
                <button class="filter-btn active" data-filter="all" style="padding:0.75rem 1.5rem; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:4px; cursor:pointer;">All Projects</button>
                <button class="filter-btn" data-filter="inspection" style="padding:0.75rem 1.5rem; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:4px; cursor:pointer;">Inspections</button>
                <button class="filter-btn" data-filter="mapping" style="padding:0.75rem 1.5rem; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:4px; cursor:pointer;">Mapping</button>
                <button class="filter-btn" data-filter="lidar" style="padding:0.75rem 1.5rem; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:4px; cursor:pointer;">LiDAR</button>
            </div>
            
            <div class="grid-3" id="portfolio-grid">
                <div class="text-center" style="grid-column: 1/-1; padding: 3rem;">
                    <div class="loading" style="display:inline-block; width:20px; height:20px; border:3px solid #ccc; border-top-color:var(--accent-blue); border-radius:50%; animation:spin 1s infinite;"></div>
                    <p style="margin-top:1rem; color:var(--text-secondary);">Loading projects...</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom"><p>&copy; 2026 Velodrones. All Rights Reserved.</p></div>
        </div>
    </footer>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="js/script.js"></script>
    <script src="js/portfolio.js"></script>
</body>
</html>
